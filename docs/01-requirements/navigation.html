<header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">

        <div class="flex justify-between items-center py-4">
            <!-- Logo -->
            <a href="#home" class="flex items-center gap-2 text-xl font-bold text-slate-900">
                <!-- Placeholder SVG Logo -->
                <svg class="h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>IntelliGrade</span>
            </a>

            <!-- Desktop Navigation Links -->
            <nav class="hidden md:flex items-center gap-8">
                <a href="#features" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Features</a>
                <a href="#how-it-works" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">How It Works</a>
                <a href="#benefits" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Benefits</a>
                <a href="#about" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">About</a>
            </nav>

            <!-- Action Buttons -->
            <div class="hidden md:flex items-center gap-4">
                <a href="#" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Sign In</a>
                <a href="#" class="px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow-sm hover:bg-blue-700 transition-colors">Get Started</a>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden">
                <button class="text-slate-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>

            </div>
        </div>

<script>
document.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    if (window.scrollY > 50) {
        // On scroll, add a white background, a subtle shadow, and a backdrop blur for a modern, glassy effect.
        navbar.classList.add('bg-white/80', 'shadow-sm', 'backdrop-blur-lg');
    } else {
        // At the top, the navbar is transparent.
        navbar.classList.remove('bg-white/80', 'shadow-sm', 'backdrop-blur-lg');
    }
});
</script>
