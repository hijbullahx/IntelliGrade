{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Metadata -->
    <title>IntelliGrade: AI-Assisted Examination Evaluation</title>
    <meta name="description" content="IntelliGrade is an AI-assisted examination evaluation platform that enhances grading efficiency, consistency, and transparency while keeping instructors in full control.">
    <meta name="keywords" content="AI grading, examination evaluation, education technology, teacher assistant, rubric-based grading, SaaS">
    <meta name="author" content="IntelliGrade">

    <!-- Favicon (placeholder) -->
    <link rel="icon" href="{% static 'core/images/favicon.ico' %}" type="image/x-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    {% block content %}{% endblock %}
</body>
</html>
