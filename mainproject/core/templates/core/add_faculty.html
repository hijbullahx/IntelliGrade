{% extends 'base.html' %}

{% block title %}Add Faculty Member | IntelliGrade{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-8">
    
    <!-- Title -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold theme-text-primary tracking-tight flex items-center gap-2.5">
                <i data-lucide="user-plus" class="w-6 h-6 text-brand-500"></i> Add Faculty Member
            </h1>
            <p class="theme-text-muted text-sm mt-1">Register a new instructor profile and assign academic department permissions.</p>
        </div>
        <a href="{% url 'exam_controller_dashboard' %}" class="text-xs theme-text-muted hover:text-brand-500 flex items-center gap-1 transition-colors">
            &larr; Back to Controller Portal
        </a>
    </div>

    <!-- Form Card -->
    <form method="POST" class="glass-card p-6 md:p-8 rounded-2xl space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">First Name</label>
                <input type="text" name="first_name" placeholder="e.g. Dr. Al-Amin" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none" required>
            </div>

            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">Last Name</label>
                <input type="text" name="last_name" placeholder="e.g. Hossain" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none" required>
            </div>

            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">Official Email</label>
                <input type="email" name="email" placeholder="faculty@iubat.edu" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none" required>
            </div>

            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">Username / Employee ID</label>
                <input type="text" name="username" placeholder="emp_104" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none" required>
            </div>

            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">Department Assignment</label>
                <select name="department" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none">
                    <option value="CSE" selected>Computer Science & Engineering (CSE)</option>
                    <option value="EEE">Electrical & Electronic Engineering (EEE)</option>
                    <option value="BBA">Business Administration (BBA)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold theme-text-secondary mb-1.5">Designation</label>
                <input type="text" name="designation" value="Assistant Professor" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-3.5 py-2.5 text-xs theme-text-primary focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
        </div>

        <div class="pt-2 flex items-center justify-end gap-3">
            <a href="{% url 'exam_controller_dashboard' %}" class="px-4 py-2.5 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 theme-text-primary text-xs font-semibold rounded-xl">Cancel</a>
            <button type="submit" class="px-6 py-2.5 bg-brand-600 hover:bg-brand-500 text-white text-xs font-bold rounded-xl shadow-lg shadow-brand-600/25 transition-all flex items-center gap-2">
                <i data-lucide="check" class="w-4 h-4"></i> Save & Register Faculty Member
            </button>
        </div>
    </form>

</div>
{% endblock %}
